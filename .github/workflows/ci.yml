name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs of the same branch on new pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # macOS Host (Swift Package)
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS Host (Swift)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build macOS Host
        working-directory: loupe-host-macos
        run: swift build

      - name: Test macOS Host
        working-directory: loupe-host-macos
        run: |
          if [ -d Tests ]; then
            swift test
          else
            echo "No tests directory; skipping"
          fi

  # ---------------------------------------------------------------------------
  # iOS Controller (Xcode project)
  # ---------------------------------------------------------------------------
  build-ios:
    name: iOS Controller (Xcode)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version

      # The LoupeControllerApp.xcodeproj references the local Swift Package
      # via a relative path. We do NOT need a workspace to build it.
      - name: Resolve Packages
        working-directory: apps/LoupeControllerApp
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project LoupeControllerApp.xcodeproj \
            -scheme LoupeControllerApp

      - name: Build iOS App (Simulator, no signing)
        working-directory: apps/LoupeControllerApp
        run: |
          xcodebuild \
            -project LoupeControllerApp.xcodeproj \
            -scheme LoupeControllerApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

  # ---------------------------------------------------------------------------
  # Signaling server (Node.js + TypeScript)
  # ---------------------------------------------------------------------------
  build-signaling:
    name: Signaling (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: loupe-signaling/package-lock.json

      - name: Install dependencies
        working-directory: loupe-signaling
        run: npm ci

      - name: Typecheck
        working-directory: loupe-signaling
        run: npm run typecheck

      - name: Build
        working-directory: loupe-signaling
        run: npm run build

      # Smoke tests do not need any external services. They boot the server
      # in-process, hit a handful of routes, and shut it down.
      - name: Smoke (protocol)
        working-directory: loupe-signaling
        run: npm run test:smoke

      - name: Smoke (site + waitlist)
        working-directory: loupe-signaling
        run: npm run test:site

      - name: Audit (production dependencies)
        working-directory: loupe-signaling
        run: npm audit --omit=dev --audit-level=high
