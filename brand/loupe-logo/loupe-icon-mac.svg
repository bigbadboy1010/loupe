<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- macOS uses square icons, OS applies corner radius mask automatically -->
  <defs>
    <linearGradient id="bgMac" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
    <radialGradient id="glowMac" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bgMac)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#glowMac)"/>
  <circle cx="512" cy="512" r="320" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.85"/>
  <circle cx="512" cy="512" r="200" fill="none" stroke="#FFFFFF" stroke-width="14" opacity="0.95"/>
  <circle cx="512" cy="512" r="96" fill="#FFFFFF" opacity="0.95"/>
  <path d="M 800 420 Q 880 470 880 540 Q 880 610 800 660 L 800 420 Z" fill="#0A2540"/>
</svg>
