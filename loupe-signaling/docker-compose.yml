services:
  signaling:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      LOG_LEVEL: "info"
      TURN_SECRET: "${TURN_SECRET:?set TURN_SECRET in your environment or .env}"
      TURN_HOST: "${TURN_HOST:?set TURN_HOST to the public coturn hostname/IP}"
      TURN_PORT: "3478"
      TURN_TTL_SECONDS: "3600"
      WS_MAX_MESSAGE_BYTES: "65536"
      HTTP_RATE_LIMIT_MAX: "120"
      HTTP_RATE_LIMIT_WINDOW_MS: "60000"
      WS_CONNECTION_RATE_LIMIT_MAX: "30"
      WS_MESSAGE_RATE_LIMIT_MAX: "300"
      WS_RATE_LIMIT_WINDOW_MS: "60000"
    depends_on:
      - coturn

  coturn:
    build: ./coturn
    restart: unless-stopped
    network_mode: host
    environment:
      TURN_SECRET: "${TURN_SECRET:?set TURN_SECRET in your environment or .env}"
      TURN_REALM: "${TURN_REALM:-loupe.local}"
      TURN_PORT: "3478"
      TURN_MIN_PORT: "49152"
      TURN_MAX_PORT: "65535"
      TURN_EXTERNAL_IP: "${TURN_EXTERNAL_IP:-}"
